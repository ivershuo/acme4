email: "your@email.com"
domains:
  - names: ["example.com", "*.example.com"]
    provider: "hurricane"
    credentials:
      api_key: "HE_API_KEY"
  - names: ["example.net"]
    provider: "cloudflare"
    credentials:
      api_token: "CF_xxx"
  - names: ["foo.com"]
    provider: "tencentcloud"
    credentials:
      secret_id: "TENCENT_SECRET_ID"
      secret_key: "TENCENT_SECRET_KEY"
  - names: ["bar.com"]
    provider: "porkbun"
    credentials:
      api_key: "PORKBUN_API_KEY"
      secret_api_key: "PORKBUN_SECRET_API_KEY"
cert_dir: "./certs"
account_dir: "./accounts"
renew_before: 30 # 证书到期前多少天开始续期，默认30天
post_renew_hooks:
  - "nginx -s reload"
  # - "systemctl reload haproxy"

# 邮件通知配置（可选）
email_notification:
  enabled: true
  resend_api_key: "re_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  from_email: "acme4@yourdomain.com" # 必须是已验证域名的邮箱
  from_name: "ACME4 Certificate Manager"
  to_emails:
    - "admin@yourdomain.com"
    - "ops@yourdomain.com"
  # 通知类型配置
  notify_on_success: true # 证书续期成功时发送通知
  notify_on_failure: true # 证书续期失败时发送通知
  notify_on_expiry: true # 证书即将到期时发送通知（可选功能）
