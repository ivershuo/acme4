email: "your@email.com"
domains:
  - names: ["example.com", "*.example.com"]
    provider: "hurricane"
    credentials:
      # Hurricane Electric expects the same format as HURRICANE_TOKENS:
      # a comma-separated key=value map where the key is the domain or full hostname.
      # Common case:
      # api_key: "example.com=HE_API_KEY"
      # If you need a record-specific override, use the full hostname:
      # api_key: "example.com=HE_API_KEY,_acme-challenge.example.com=HE_RECORD_TOKEN"
      api_key: "example.com=HE_API_KEY"
  - names: ["example.net"]
    provider: "cloudflare"
    credentials:
      api_token: "CF_xxx"
  - names: ["foo.com"]
    provider: "tencentcloud"
    credentials:
      secret_id: "TENCENT_SECRET_ID"
      secret_key: "TENCENT_SECRET_KEY"
  - names: ["bar.com"]
    provider: "porkbun"
    credentials:
      api_key: "PORKBUN_API_KEY"
      secret_api_key: "PORKBUN_SECRET_API_KEY"
cert_dir: "./certs"
account_dir: "./accounts"
renew_before: 30 # 证书到期前多少天开始续期，默认30天
dns_resolvers:
  - "8.8.8.8"   # 可选，指定 DNS 检测解析器；未指定则使用系统默认
  - "1.1.1.1"
post_renew_hooks:
  - "nginx -s reload"
  # - "systemctl reload haproxy"

# 邮件通知配置（可选）
email_notification:
  enabled: true
  resend_api_key: "re_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  from_email: "acme4@yourdomain.com" # 必须是已验证域名的邮箱
  from_name: "ACME4 Certificate Manager"
  to_emails:
    - "admin@yourdomain.com"
    - "ops@yourdomain.com"
  # 通知类型配置
  notify_on_success: true # 证书续期成功时发送通知
  notify_on_failure: true # 证书续期失败时发送通知
  notify_on_expiry: true # 证书即将到期时发送通知（可选功能）
